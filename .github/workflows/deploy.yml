name: Deploy Portfolio

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH to server and deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: 15.207.238.237
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/portfolio
            git pull
            docker build -t rohit-portfolio .
            docker stop rohit-container || true
            docker rm rohit-container || true
            docker run -d -p 80:80 --name rohit-container rohit-portfolio
